naftiko: 1.0.0-alpha2
info:
  label: Pulse Api — AllDevices
  description: 'Pulse Api — AllDevices. 1 operations. Lead operation: Gets all of the grows devices, including latest data.

    Sparklines (data for the last hour) are not included. Self-contained Naftiko capability covering one Pulse Grow business
    surface.'
  tags:
  - Pulse Grow
  - AllDevices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PULSE_GROW_API_KEY: PULSE_GROW_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulse-grow-alldevices
    baseUri: ''
    description: Pulse Api — AllDevices business capability. Self-contained, no shared references.
    resources:
    - name: all-devices
      path: /all-devices
      operations:
      - name: get
        method: GET
        description: Gets all of the grows devices, including latest data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pulse-grow-alldevices-rest
    port: 8080
    description: REST adapter for Pulse Api — AllDevices. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/all-devices
      name: all-devices
      description: REST surface for all-devices.
      operations:
      - method: GET
        name: get
        description: Gets all of the grows devices, including latest data.
        call: pulse-grow-alldevices.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulse-grow-alldevices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pulse Api — AllDevices. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: gets-all-grows-devices-including
      description: Gets all of the grows devices, including latest data.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulse-grow-alldevices.get
      outputParameters:
      - type: object
        mapping: $.
