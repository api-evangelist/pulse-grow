naftiko: 1.0.0-alpha2
info:
  label: Pulse Api — Invitation
  description: 'Pulse Api — Invitation. 1 operations. Lead operation: List of invitations that have been sent, but not yet
    been accepted or canceled.. Self-contained Naftiko capability covering one Pulse Grow business surface.'
  tags:
  - Pulse Grow
  - Invitation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PULSE_GROW_API_KEY: PULSE_GROW_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulse-grow-invitation
    baseUri: ''
    description: Pulse Api — Invitation business capability. Self-contained, no shared references.
    resources:
    - name: invitations
      path: /invitations
      operations:
      - name: get
        method: GET
        description: List of invitations that have been sent, but not yet been accepted or canceled.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pulse-grow-invitation-rest
    port: 8080
    description: REST adapter for Pulse Api — Invitation. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/invitations
      name: invitations
      description: REST surface for invitations.
      operations:
      - method: GET
        name: get
        description: List of invitations that have been sent, but not yet been accepted or canceled.
        call: pulse-grow-invitation.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulse-grow-invitation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pulse Api — Invitation. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-invitations-that-have-been
      description: List of invitations that have been sent, but not yet been accepted or canceled.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulse-grow-invitation.get
      outputParameters:
      - type: object
        mapping: $.
